<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 390px; min-height: 844px;
      font-family: Inter, system-ui, sans-serif;
      background: #faf7f2; color: #2d2824;
    }
    .wrap { padding: 20px 18px 88px; }
    .eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #b5013a; margin-bottom: 8px;
    }
    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 28px; line-height: 1.1; margin-bottom: 6px;
    }
    .meta { color: #7a7168; font-size: 14px; margin-bottom: 18px; }
    .stat {
      background: #fff; border: 1px solid #ebe4da; border-radius: 18px;
      padding: 18px; margin-bottom: 16px;
    }
    .stat-num {
      font-family: "Space Grotesk", sans-serif;
      font-size: 34px; font-weight: 700; margin-bottom: 8px;
    }
    .bar { height: 6px; background: #ece5dc; border-radius: 999px; margin-bottom: 8px; }
    .stat-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      color: #9a9188; text-transform: uppercase;
    }
    .search {
      width: 100%; height: 46px; border: 1px solid #ddd5cb; border-radius: 999px;
      background: #fff; padding: 0 16px; color: #9a9188; font-size: 14px;
      margin-bottom: 12px;
    }
    .row { display: flex; gap: 10px; margin-bottom: 18px; align-items: center; }
    .ghost {
      flex: 1; height: 44px; border: 1px solid #ddd5cb; border-radius: 999px;
      background: #fff; font-size: 14px; font-weight: 600;
    }
    .link { color: #7a7168; font-size: 13px; white-space: nowrap; }
    .section {
      background: #fff; border: 1px solid #ebe4da; border-radius: 16px;
      overflow: hidden; margin-bottom: 12px;
    }
    .section-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; font-weight: 600;
    }
    .section.open { border-color: #e8c4cf; }
    .musician {
      background: #fff5f7; border-top: 1px solid #f0e0e5; padding: 14px 16px;
    }
    .name { font-weight: 600; margin-bottom: 10px; }
    .toggle {
      display: grid; grid-template-columns: 1fr 1fr; border: 1px solid #ddd5cb;
      border-radius: 999px; overflow: hidden; background: #fff;
    }
    .toggle span {
      text-align: center; padding: 10px 8px; font-size: 13px; font-weight: 600;
    }
    .toggle .absent { background: #b5013a; color: #fff; }
    .nav {
      position: fixed; left: 0; right: 0; bottom: 0; height: 72px;
      background: #fff; border-top: 1px solid #ebe4da;
      display: grid; grid-template-columns: repeat(6, 1fr); align-items: center;
      padding: 0 8px 8px;
    }
    .nav-item { text-align: center; color: #a59d94; font-size: 10px; }
    .nav-item.active { color: #b5013a; font-weight: 600; }
    .icon { width: 22px; height: 22px; margin: 0 auto 4px; border-radius: 6px; background: currentColor; opacity: 0.18; }
    .nav-item.active .icon { opacity: 1; background: #b5013a; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Pasar lista</div>
    <h1>Ensayo Parcial Metales</h1>
    <p class="meta">martes, 7 de julio de 2026, 19:30</p>

    <div class="stat">
      <div class="stat-num">0 / 59</div>
      <div class="bar"></div>
      <div class="stat-label">Presentes</div>
    </div>

    <input class="search" value="Buscar musico..." readonly />
    <div class="row">
      <button class="ghost">Todos presentes</button>
      <span class="link">Desplegar todo</span>
    </div>

    <div class="section">
      <div class="section-head"><span>Tuba</span><span>0/13</span></div>
    </div>

    <div class="section open">
      <div class="section-head"><span>Trompa</span><span>0/6</span></div>
      <div class="musician">
        <div class="name">Laura Vidal</div>
        <div class="toggle"><span class="absent">Falta</span><span>Presente</span></div>
      </div>
      <div class="musician">
        <div class="name">Pablo Serra</div>
        <div class="toggle"><span class="absent">Falta</span><span>Presente</span></div>
      </div>
      <div class="musician">
        <div class="name">Marta Soler</div>
        <div class="toggle"><span class="absent">Falta</span><span>Presente</span></div>
      </div>
    </div>

    <div class="section">
      <div class="section-head"><span>Trombon</span><span>0/8</span></div>
    </div>
  </div>
  <div class="nav">
    <div class="nav-item"><div class="icon"></div></div>
    <div class="nav-item active"><div class="icon"></div>Eventos</div>
    <div class="nav-item"><div class="icon"></div></div>
    <div class="nav-item"><div class="icon"></div></div>
    <div class="nav-item"><div class="icon"></div></div>
    <div class="nav-item"><div class="icon"></div></div>
  </div>
</body>
</html>
